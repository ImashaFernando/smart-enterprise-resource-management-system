<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Employee | SERMS</title>

    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/employees.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="main">

    <div class="page-header">
        <h1>
            <i class="fa-solid fa-user-pen"></i>
            Edit Employee
        </h1>
        <p>Update employee information and employment details.</p>
    </div>

    <div class="form-card">

        <form th:action="@{/employees/update/{id}(id=${employee.id})}"
              th:object="${employee}"
              method="post">

            <!-- ================= Personal Information ================= -->

            <div class="section-title">
                <i class="fa-solid fa-user"></i>
                Personal Information
            </div>

            <div class="form-grid">

                <div class="form-group">
                    <label><i class="fa-solid fa-id-badge"></i> Employee Code</label>
                    <input type="text" th:field="*{employeeCode}" required>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-user"></i> First Name</label>
                    <input type="text" th:field="*{firstName}" required>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-user"></i> Last Name</label>
                    <input type="text" th:field="*{lastName}" required>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-envelope"></i> Email</label>
                    <input type="email" th:field="*{email}" required>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-phone"></i> Phone Number</label>
                    <input type="text" th:field="*{phone}">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-address-card"></i> NIC</label>
                    <input type="text" th:field="*{nic}">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-venus-mars"></i> Gender</label>
                    <select th:field="*{gender}">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-calendar-days"></i> Date of Birth</label>
                    <input type="date" th:field="*{dateOfBirth}">
                </div>

            </div>

            <!-- ================= Employment Information ================= -->

            <div class="section-title">
                <i class="fa-solid fa-briefcase"></i>
                Employment Information
            </div>

            <div class="form-grid">

                <div class="form-group">
                    <label><i class="fa-solid fa-building"></i> Department</label>

                    <select th:field="*{department}" required>

                        <option value="">Select Department</option>

                        <option th:each="dept : ${departments}"
                                th:value="${dept.id}"
                                th:text="${dept.departmentName}">
                        </option>

                    </select>

                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-user-tie"></i> Designation</label>
                    <input type="text" th:field="*{designation}">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-money-bill-wave"></i> Salary</label>
                    <input type="number"
                           step="0.01"
                           th:field="*{salary}">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-circle-check"></i> Status</label>

                    <select th:field="*{status}">
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="INACTIVE">INACTIVE</option>
                    </select>

                </div>

            </div>

            <!-- ================= Address ================= -->

            <div class="section-title">
                <i class="fa-solid fa-location-dot"></i>
                Address
            </div>

            <div class="form-group full-width">

                <textarea
                        rows="4"
                        th:field="*{address}"
                        placeholder="Employee Address">
                </textarea>

            </div>

            <!-- ================= Buttons ================= -->

            <div class="button-group">

                <a th:href="@{/employees}"
                   class="cancel-btn">
                    <i class="fa-solid fa-arrow-left"></i>
                    Cancel
                </a>

                <button type="submit"
                        class="add-btn">

                    <i class="fa-solid fa-floppy-disk"></i>
                    Update Employee

                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
