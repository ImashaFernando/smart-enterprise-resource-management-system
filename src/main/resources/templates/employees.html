<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management | SERMS</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/employees.css}">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">


</head>
<body>

<div class="sidebar">

    <div class="brand">
        <span class="brand-dot"></span>

        <div>
            <h2>SERMS</h2>
            <span>ENTERPRISE CONSOLE</span>
        </div>
    </div>

    <div class="nav-group-label">Operate</div>

    <nav>
        <a th:href="@{/dashboard}">
            <i class="fa-solid fa-house"></i>
            Dashboard
        </a>

        <a th:href="@{/employees}" class="active">
            <i class="fa-solid fa-users"></i>
            Employees
        </a>

        <a href="#">
            <i class="fa-solid fa-building"></i>
            Departments
        </a>

        <a href="#">
            <i class="fa-solid fa-box"></i>
            Inventory
        </a>

        <a href="#">
            <i class="fa-solid fa-diagram-project"></i>
            Projects
        </a>

        <a href="#">
            <i class="fa-solid fa-money-bill"></i>
            Finance
        </a>

        <a href="#">
            <i class="fa-solid fa-chart-column"></i>
            Reports
        </a>
    </nav>

    <div class="bottom-nav">
        <nav>
            <a href="#">
                <i class="fa-solid fa-gear"></i>
                Settings
            </a>

            <a th:href="@{/logout}">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </a>
        </nav>
    </div>

</div>

<div class="main">

        <div class="main">

            <!-- Top Bar -->
            <div class="topbar">
                <div class="topbar-heading">
                    <p class="eyebrow">Human Resource Module</p>
                    <h1>Employee Management</h1>
                </div>

                <div class="topbar-right">
                    <span class="clock" id="clock">--:--:--</span>

                    <div class="profile-chip">
                        <span class="avatar">A</span>

                        <span class="role">
                    Administrator
                    <small>Full access</small>
                </span>
                    </div>
                </div>
            </div>

            <!-- Employee Content -->

            <div class="employee-container">

                <div class="employee-header">

                    <h2>Employees</h2>

                    <div class="employee-actions">

                        <!-- Search Form -->
                        <form th:action="@{/employees}" method="get" class="search-form">

                            <div class="search-wrapper">

                                <i class="fa-solid fa-magnifying-glass"></i>

                                <input
                                        type="text"
                                        name="keyword"
                                        class="search-box"
                                        placeholder="Search by Code, Name, Email or Department..."
                                        th:value="${keyword}">

                            </div>

                        </form>

                        <!-- Add Employee Button -->
                        <a th:href="@{/employees/add}" class="add-btn">
                            <i class="fa-solid fa-plus"></i>
                            Add Employee
                        </a>

                    </div>

                </div>
                </div>

                <table class="employee-table">
                    <thead>

                    <tr>

                        <th>Code</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Designation</th>
                        <th>Status</th>
                        <th>Action</th>

                    </tr>

                    </thead>
                    <tbody>

                    <tr th:each="employee : ${employees}">

                        <td th:text="${employee.employeeCode}"></td>

                        <td th:text="${employee.firstName + ' ' + employee.lastName}"></td>

                        <td th:text="${employee.email}"></td>

                        <td th:text="${employee.department != null ? employee.department.departmentName : 'N/A'}"></td>

                        <td th:text="${#strings.capitalize(employee.designation)}"></td>

                        <td>
        <span th:class="'status ' + ${employee.status.toLowerCase()}"
              th:text="${employee.status}">
        </span>
                        </td>

                        <td>

                            <a th:href="@{/employees/edit/{id}(id=${employee.id})}">
                                <i class="fa-solid fa-pen"></i>
                            </a>

                            <a href="#"
                               th:onclick="'deleteEmployee(' + ${employee.id} + '); return false;'">
                                <i class="fa-solid fa-trash"></i>
                            </a>

                        </td>

                    </tr>

                    </tbody>
                </table>

            </div>

        </div>
</div>

<script>
    function tick() {
        const el = document.getElementById("clock");
        if (!el) return;

        const now = new Date();

        el.textContent =
            now.toLocaleTimeString('en-GB', { hour12: false });
    }

    tick();
    setInterval(tick, 1000);
</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/employees.js}"></script>
</body>
</html>
