<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Project | SERMS</title>

    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/project.css}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="main">

    <div class="page-header">

        <h1>
            <i class="fa-solid fa-diagram-project"></i>
            Add Project
        </h1>

        <p>Create a new enterprise project.</p>

    </div>

    <div class="form-card">

        <form th:action="@{/projects/save}"
              th:object="${project}"
              method="post">

            <!-- Project Information -->

            <div class="section-title">

                <i class="fa-solid fa-folder-open"></i>

                Project Information

            </div>

            <div class="form-grid">

                <div class="form-group">

                    <label>Project Code</label>

                    <input
                            type="text"
                            th:field="*{projectCode}"
                            placeholder="PRJ001"
                            required>

                </div>

                <div class="form-group">

                    <label>Project Name</label>

                    <input
                            type="text"
                            th:field="*{projectName}"
                            placeholder="Enterprise Resource Management System"
                            required>

                </div>

                <div class="form-group">

                    <label>Client Name</label>

                    <input
                            type="text"
                            th:field="*{clientName}"
                            placeholder="ABC Company"
                            required>

                </div>

                <div class="form-group">

                    <label>Project Manager</label>

                    <input
                            type="text"
                            th:field="*{projectManager}"
                            placeholder="John Smith"
                            required>

                </div>

            </div>

            <!-- Schedule -->

            <div class="section-title">

                <i class="fa-solid fa-calendar-days"></i>

                Schedule

            </div>

            <div class="form-grid">

                <div class="form-group">

                    <label>Start Date</label>

                    <input
                            type="date"
                            th:field="*{startDate}"
                            required>

                </div>

                <div class="form-group">

                    <label>End Date</label>

                    <input
                            type="date"
                            th:field="*{endDate}"
                            required>

                </div>

            </div>

            <!-- Budget -->

            <div class="section-title">

                <i class="fa-solid fa-money-bill-wave"></i>

                Budget & Status

            </div>

            <div class="form-grid">

                <div class="form-group">

                    <label>Budget (LKR)</label>

                    <input
                            type="number"
                            step="0.01"
                            th:field="*{budget}"
                            placeholder="5000000"
                            required>

                </div>

                <div class="form-group">

                    <label>Priority</label>

                    <select th:field="*{priority}" required>

                        <option value="">Select Priority</option>

                        <option value="High">High</option>

                        <option value="Medium">Medium</option>

                        <option value="Low">Low</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Status</label>

                    <select th:field="*{status}" required>

                        <option value="">Select Status</option>

                        <option value="Planning">Planning</option>

                        <option value="In Progress">In Progress</option>

                        <option value="On Hold">On Hold</option>

                        <option value="Completed">Completed</option>

                        <option value="Cancelled">Cancelled</option>

                    </select>

                </div>

            </div>

            <!-- Description -->

            <div class="section-title">

                <i class="fa-solid fa-align-left"></i>

                Description

            </div>

            <div class="form-group">

                <textarea
                        th:field="*{description}"
                        rows="5"
                        placeholder="Enter project description..."></textarea>

            </div>

            <!-- Buttons -->

            <div class="button-group">

                <a
                        th:href="@{/projects}"
                        class="cancel-btn">

                    <i class="fa-solid fa-arrow-left"></i>

                    Cancel

                </a>

                <button
                        type="submit"
                        class="add-btn">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Project

                </button>

            </div>

        </form>

    </div>

</div>

</body>

</html>
