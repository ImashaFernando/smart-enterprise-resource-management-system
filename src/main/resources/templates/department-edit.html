<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

  <meta charset="UTF-8">

  <title>Edit Department | SERMS</title>

  <link rel="stylesheet" th:href="@{/css/dashboard.css}">
  <link rel="stylesheet" th:href="@{/css/departments.css}">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

</head>

<body>

<div class="main">

  <div class="form-card">

    <h1>Edit Department</h1>

    <form th:action="@{/departments/update/{id}(id=${department.id})}"
          th:object="${department}"
          method="post">

      <div class="form-group">

        <label>Department Code</label>

        <input
                type="text"
                th:field="*{departmentCode}"
                placeholder="Department Code"
                required>

      </div>

      <div class="form-group">

        <label>Department Name</label>

        <input
                type="text"
                th:field="*{departmentName}"
                placeholder="Department Name"
                required>

      </div>

      <div class="form-group">

        <label>Manager Name</label>

        <input
                type="text"
                th:field="*{managerName}"
                placeholder="Manager Name"
                required>

      </div>
      <div class="form-group">

        <label>Total Employees</label>

        <input
                type="number"
                th:field="*{employeeCount}"
                placeholder="Enter Total Employees"
                required>

      </div>


      <div class="form-group">

        <label>Status</label>

        <select th:field="*{status}">

          <option value="ACTIVE">ACTIVE</option>

          <option value="INACTIVE">INACTIVE</option>

        </select>

      </div>

      <div class="button-group">

        <button type="submit" class="add-btn">

          <i class="fa-solid fa-floppy-disk"></i>

          Update Department

        </button>

        <a th:href="@{/departments}" class="cancel-btn">

          <i class="fa-solid fa-arrow-left"></i>

          Back

        </a>

      </div>

    </form>

  </div>

</div>

</body>

</html>
