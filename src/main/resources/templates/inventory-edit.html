<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Product | SERMS</title>

    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/inventory.css}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="main">

    <div class="page-header">

        <h1>
            <i class="fa-solid fa-pen-to-square"></i>
            Edit Product
        </h1>

        <p>Update inventory product information.</p>

    </div>

    <div class="form-card">

        <form th:action="@{/inventory/update/{id}(id=${inventory.id})}"
              th:object="${inventory}"
              method="post">

            <!-- ================= Product Information ================= -->

            <div class="section-title">

                <i class="fa-solid fa-box-open"></i>

                Product Information

            </div>

            <div class="form-grid">

                <div class="form-group">

                    <label>
                        <i class="fa-solid fa-barcode"></i>
                        Product Code
                    </label>

                    <input
                            type="text"
                            th:field="*{productCode}"
                            required>

                </div>

                <div class="form-group">

                    <label>
                        <i class="fa-solid fa-box"></i>
                        Product Name
                    </label>

                    <input
                            type="text"
                            th:field="*{productName}"
                            required>

                </div>

                <div class="form-group">

                    <label>
                        <i class="fa-solid fa-layer-group"></i>
                        Category
                    </label>

                    <select th:field="*{category}" required>

                        <option value="">Select Category</option>

                        <option>IT Equipment</option>
                        <option>Office Furniture</option>
                        <option>Electronics</option>
                        <option>Networking</option>
                        <option>Stationery</option>
                        <option>Office Supplies</option>
                        <option>Accessories</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>
                        <i class="fa-solid fa-cubes"></i>
                        Quantity
                    </label>

                    <input
                            type="number"
                            min="0"
                            th:field="*{quantity}"
                            required>

                </div>

            </div>

            <!-- ================= Pricing ================= -->

            <div class="section-title">

                <i class="fa-solid fa-money-bill-wave"></i>

                Pricing

            </div>

            <div class="form-grid">

                <div class="form-group">

                    <label>
                        <i class="fa-solid fa-money-bill"></i>
                        Unit Price
                    </label>

                    <input
                            type="number"
                            step="0.01"
                            min="0"
                            th:field="*{unitPrice}"
                            required>

                </div>

                <div class="form-group">

                    <label>
                        <i class="fa-solid fa-circle-check"></i>
                        Status
                    </label>

                    <select th:field="*{status}">

                        <option value="IN STOCK">IN STOCK</option>
                        <option value="LOW STOCK">LOW STOCK</option>
                        <option value="OUT OF STOCK">OUT OF STOCK</option>

                    </select>

                </div>

            </div>

            <!-- ================= Supplier ================= -->

            <div class="section-title">

                <i class="fa-solid fa-truck"></i>

                Supplier Information

            </div>

            <div class="form-grid">

                <div class="form-group">

                    <label>
                        <i class="fa-solid fa-building"></i>
                        Supplier
                    </label>

                    <input
                            type="text"
                            th:field="*{supplier}"
                            required>

                </div>

                <div class="form-group">

                    <label>
                        <i class="fa-solid fa-warehouse"></i>
                        Warehouse Location
                    </label>

                    <input
                            type="text"
                            th:field="*{location}"
                            required>

                </div>

            </div>

            <!-- ================= Buttons ================= -->

            <div class="button-group">

                <a th:href="@{/inventory}"
                   class="cancel-btn">

                    <i class="fa-solid fa-arrow-left"></i>

                    Cancel

                </a>

                <button
                        type="submit"
                        class="add-btn">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Update Product

                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
